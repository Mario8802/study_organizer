{% extends "base.html" %}

{% block content %}

    <div class="container mt-4">

        <h2 class="mb-4">Courses</h2>

        <a href="{% url 'course_create' %}" class="btn btn-primary mb-3">
            Add Course
        </a>

        <div class="row">

            {% for course in courses %}

                <div class="col-md-4">
                    <div class="card mb-4 course-card">
                        <div class="card-body">

                            <h5 class="card-title">
                                <a href="{% url 'course_detail' course.id %}">
                                    {{ course.title }}
                                </a>
                            </h5>

                            <p class="card-text">
                                {{ course.description|truncatechars:120 }}
                            </p>

                            <div class="mt-3">

                                <a href="{% url 'course_edit' course.id %}" class="btn btn-sm btn-outline-primary">
                                    Edit
                                </a>

                                <a href="{% url 'course_delete' course.id %}" class="btn btn-sm btn-outline-danger">
                                    Delete
                                </a>

                            </div>

                        </div>

                    </div>
                </div>

            {% empty %}

                <p>No courses yet.</p>

            {% endfor %}

        </div>

    </div>

{% endblock %}
