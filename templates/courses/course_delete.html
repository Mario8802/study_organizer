{% extends "base.html" %}

{% block content %}

    <div class="container mt-4">

        <h2>Delete Course</h2>

        <p>Are you sure you want to delete {{ course.title }}?</p>

        <form method="post">

            {% csrf_token %}

            <button class="btn btn-danger">Delete</button>
            <a href="{% url 'course_list' %}" class="btn btn-secondary">
                Cancel
            </a>
        </form>

    </div>

{% endblock %}
