{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2>Delete Task</h2>

    <p>
        Are you sure you want to delete <strong>{{ object.title }}</strong>?
    </p>

    <form method="post">

        {% csrf_token %}

        <button class="btn btn-danger">
            Delete
        </button>

        <a href="{% url 'task_list' %}" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
